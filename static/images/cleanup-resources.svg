  <text x="240" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Lambda Functions</text>
  <text x="240" y="190" text-anchor="middle" font-size="9" fill="#64748b">Delete functions</text>
  <text x="380" y="180" text-anchor="start" font-size="9" fill="#64748b">Xóa ngay l­p téc</text>

