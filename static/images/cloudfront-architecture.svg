<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <!-- Background -->
  <rect width="700" height="450" fill="#f8fafc"/>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b">CloudFront Content Delivery Flow</text>

  <!-- Users around the world -->
  <g transform="translate(80, 100)">
    <circle cx="0" cy="0" r="20" fill="#3b82f6"/>
    <text x="0" y="4" text-anchor="middle" fill="white" font-size="10">User</text>
  </g>

  <g transform="translate(40, 200)">
    <circle cx="0" cy="0" r="18" fill="#3b82f6"/>
    <text x="0" y="4" text-anchor="middle" fill="white" font-size="9">User</text>
  </g>

  <g transform="translate(120, 220)">
    <circle cx="0" cy="0" r="18" fill="#3b82f6"/>
    <text x="0" y="4" text-anchor="middle" fill="white" font-size="9">User</text>
  </g>

  <!-- Edge Locations (CloudFront PoPs) -->
  <rect x="180" y="60" width="80" height="50" rx="5" fill="#ff9900"/>
  <text x="220" y="80" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Edge</text>
  <text x="220" y="92" text-anchor="middle" fill="white" font-size="8">Singapore</text>

  <rect x="180" y="130" width="80" height="50" rx="5" fill="#ff9900"/>
  <text x="220" y="150" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Edge</text>
  <text x="220" y="162" text-anchor="middle" fill="white" font-size="8">Tokyo</text>

  <rect x="180" y="200" width="80" height="50" rx="5" fill="#ff9900"/>
  <text x="220" y="220" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Edge</text>
  <text x="220" y="232" text-anchor="middle" fill="white" font-size="8">Sydney</text>

  <!-- Regional Edge Cache -->
  <rect x="300" y="130" width="100" height="50" rx="5" fill="#f59e0b"/>
  <text x="350" y="150" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Regional</text>
  <text x="350" y="162" text-anchor="middle" fill="white" font-size="9">Edge Cache</text>

  <!-- Origin (S3) -->
  <rect x="450" y="130" width="100" height="50" rx="5" fill="#3b82f6"/>
  <text x="500" y="150" text-anchor="middle" fill="white" font-size="10" font-weight="bold">S3 Bucket</text>
  <text x="500" y="162" text-anchor="middle" fill="white" font-size="9">Origin</text>

  <!-- Arrows from users to edge -->
  <line x1="100" y1="100" x2="180" y2="85" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="60" y1="200" x2="180" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="100" y1="220" x2="180" y2="225" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow from edge to regional -->
  <line x1="260" y1="85" x2="300" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="155" x2="300" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="225" x2="300" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow regional to origin -->
  <line x1="400" y1="155" x2="450" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cached label -->
  <rect x="230" y="280" width="100" height="30" rx="3" fill="#dcfce7"/>
  <text x="280" y="300" text-anchor="middle" fill="#166534" font-size="10"> Cached</text>

  <!-- Info Box -->
  <rect x="50" y="320" width="250" height="110" rx="5" fill="white" stroke="#e2e8f0"/>
  <text x="175" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Cache Flow:</text>
  <text x="65" y="358" font-size="9" fill="#64748b">1. User ’ Edge Location</text>
  <text x="65" y="372" font-size="9" fill="#64748b">2. Edge ’ Regional Cache</text>
  <text x="65" y="386" font-size="9" fill="#64748b">3. Cache hit ’ Return</text>
  <text x="65" y="400" font-size="9" fill="#64748b">4. Cache miss ’ Origin (S3)</text>
  <text x="65" y="414" font-size="9" fill="#64748b">5. Cache at all levels</text>

  <!-- Stats Box -->
  <rect x="320" y="320" width="330" height="110" rx="5" fill="white" stroke="#e2e8f0"/>
  <text x="485" y="340" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Performance Benefits:</text>
  <text x="335" y="358" font-size="9" fill="#64748b"> Low latency (<50ms to edge)</text>
  <text x="335" y="372" font-size="9" fill="#64748b"> Reduced origin load</text>
  <text x="335" y="386" font-size="9" fill="#64748b"> DDoS protection (Shield)</text>
  <text x="335" y="400" font-size="9" fill="#64748b"> WAF integration</text>
  <text x="335" y="414" font-size="9" fill="#64748b"> HTTPS/HTTP3 support</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
