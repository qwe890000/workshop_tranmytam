<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <!-- Background -->
  <rect width="700" height="420" fill="#f8fafc"/>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b">API Gateway Integration Flow</text>

  <!-- Client/Frontend -->
  <rect x="50" y="80" width="100" height="50" rx="5" fill="#3b82f6"/>
  <text x="100" y="100" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Frontend</text>
  <text x="100" y="115" text-anchor="middle" fill="white" font-size="9">Client App</text>

  <!-- API Gateway -->
  <rect x="220" y="70" width="140" height="70" rx="5" fill="#ff4f00"/>
  <text x="290" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">API Gateway</text>
  <text x="290" y="110" text-anchor="middle" fill="white" font-size="9">REST API</text>
  <text x="290" y="125" text-anchor="middle" fill="white" font-size="8">/calculate</text>

  <!-- Lambda -->
  <rect x="430" y="80" width="120" height="50" rx="5" fill="#ff9900"/>
  <text x="490" y="100" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Lambda</text>
  <text x="490" y="115" text-anchor="middle" fill="white" font-size="9">Calculation</text>

  <!-- Response Arrow -->
  <line x1="550" y1="105" x2="620" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Response -->
  <rect x="620" y="80" width="60" height="50" rx="5" fill="#10b981"/>
  <text x="650" y="100" text-anchor="middle" fill="white" font-size="10" font-weight="bold">JSON</text>
  <text x="650" y="115" text-anchor="middle" fill="white" font-size="9">Response</text>

  <!-- CORS Box -->
  <rect x="220" y="170" width="140" height="40" rx="5" fill="#fef3c7" stroke="#fbbf24"/>
  <text x="290" y="193" text-anchor="middle" fill="#92400e" font-size="10">CORS Enabled</text>
  <text x="290" y="205" text-anchor="middle" fill="#92400e" font-size="8">OPTIONS, POST</text>

  <!-- Request Flow -->
  <rect x="50" y="240" width="300" height="80" rx="5" fill="white" stroke="#e2e8f0"/>
  <text x="200" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Request Flow</text>
  <text x="65" y="276" font-size="9" fill="#64748b">1. Client POST /calculate</text>
  <text x="65" y="290" font-size="9" fill="#64748b">2. API Gateway validates</text>
  <text x="65" y="304" font-size="9" fill="#64748b">3. Lambda proxy integration</text>

  <!-- API Methods Box -->
  <rect x="380" y="240" width="300" height="80" rx="5" fill="white" stroke="#e2e8f0"/>
  <text x="530" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Available Methods</text>
  <text x="395" y="276" font-size="9" fill="#64748b">POST /calculate ’ Lambda</text>
  <text x="395" y="290" font-size="9" fill="#64748b">OPTIONS /calculate ’ CORS</text>
  <text x="395" y="304" font-size="9" fill="#64748b">GET /calculate ’ Lambda (opt)</text>

  <!-- CORS Headers -->
  <rect x="50" y="340" width="630" height="65" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="365" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">CORS Headers</text>
  <text x="65" y="375" font-size="9" fill="#1e40af">Access-Control-Allow-Origin: *</text>
  <text x="250" y="375" font-size="9" fill="#1e40af">Access-Control-Allow-Headers: Content-Type</text>
  <text x="500" y="375" font-size="9" fill="#1e40af">Access-Control-Allow-Methods: POST, OPTIONS</text>
  <text x="365" y="392" font-size="9" fill="#64748b">Required for cross-origin requests from frontend</text>

  <!-- Arrows -->
  <line x1="150" y1="105" x2="220" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="105" x2="430" y2="105" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
