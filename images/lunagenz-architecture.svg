<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1e293b">LunaGenZ Serverless Architecture</text>

  <!-- User -->
  <circle cx="100" cy="250" r="30" fill="#3b82f6"/>
  <text x="100" y="255" text-anchor="middle" fill="white" font-size="12">=d User</text>

  <!-- CloudFront -->
  <rect x="200" y="220" width="120" height="60" rx="5" fill="#ff9900"/>
  <text x="260" y="245" text-anchor="middle" fill="white" font-size="11" font-weight="bold">CloudFront</text>
  <text x="260" y="260" text-anchor="middle" fill="white" font-size="9">CDN</text>

  <!-- Arrow User to CloudFront -->
  <line x1="130" y1="250" x2="200" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- S3 Bucket -->
  <rect x="350" y="220" width="120" height="60" rx="5" fill="#3b82f6"/>
  <text x="410" y="245" text-anchor="middle" fill="white" font-size="11" font-weight="bold">S3 Bucket</text>
  <text x="410" y="260" text-anchor="middle" fill="white" font-size="9">Static Files</text>

  <!-- Arrow CloudFront to S3 -->
  <line x1="320" y1="250" x2="350" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API Gateway -->
  <rect x="200" y="340" width="120" height="60" rx="5" fill="#ff4f00"/>
  <text x="260" y="365" text-anchor="middle" fill="white" font-size="11" font-weight="bold">API Gateway</text>
  <text x="260" y="380" text-anchor="middle" fill="white" font-size="9">REST API</text>

  <!-- Lambda Calculation -->
  <rect x="350" y="340" width="120" height="60" rx="5" fill="#ff9900"/>
  <text x="410" y="365" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Lambda</text>
  <text x="410" y="380" text-anchor="middle" fill="white" font-size="9">Calculation</text>

  <!-- Lambda PDF -->
  <rect x="350" y="420" width="120" height="60" rx="5" fill="#ff9900"/>
  <text x="410" y="445" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Lambda</text>
  <text x="410" y="460" text-anchor="middle" fill="white" font-size="9">PDF Generator</text>

  <!-- Arrow User to API -->
  <path d="M130 270 Q130 340 200 340" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="145" y="310" font-size="9" fill="#64748b">API Request</text>

  <!-- Arrow API to Lambda -->
  <line x1="320" y1="370" x2="350" y2="370" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow Lambda to PDF -->
  <line x1="410" y1="400" x2="410" y2="420" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- S3 PDF Bucket -->
  <rect x="500" y="420" width="120" height="60" rx="5" fill="#3b82f6"/>
  <text x="560" y="445" text-anchor="middle" fill="white" font-size="11" font-weight="bold">S3 Bucket</text>
  <text x="560" y="460" text-anchor="middle" fill="white" font-size="9">PDF Reports</text>

  <!-- Arrow Lambda to S3 PDF -->
  <line x1="470" y1="450" x2="500" y2="450" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow User to PDF Download -->
  <path d="M130 230 Q550 230 580 420" stroke="#64748b" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="400" y="220" font-size="9" fill="#64748b">Download PDF</text>

  <!-- Legend -->
  <rect x="600" y="80" width="180" height="120" rx="5" fill="white" stroke="#e2e8f0"/>
  <text x="690" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Legend</text>
  <rect x="615" y="115" width="20" height="15" fill="#3b82f6"/>
  <text x="645" y="127" font-size="10" fill="#1e293b">Storage (S3)</text>
  <rect x="615" y="140" width="20" height="15" fill="#ff9900"/>
  <text x="645" y="152" font-size="10" fill="#1e293b">Compute (Lambda)</text>
  <rect x="615" y="165" width="20" height="15" fill="#ff4f00"/>
  <text x="645" y="177" font-size="10" fill="#1e293b">API (Gateway)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
