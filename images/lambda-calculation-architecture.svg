<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <!-- Background -->
  <rect width="700" height="400" fill="#f8fafc"/>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b">Lambda Calculation Flow</text>

  <!-- Client -->
  <rect x="50" y="100" width="100" height="60" rx="5" fill="#3b82f6"/>
  <text x="100" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Frontend</text>
  <text x="100" y="140" text-anchor="middle" fill="white" font-size="9">Client App</text>

  <!-- API Gateway -->
  <rect x="200" y="100" width="120" height="60" rx="5" fill="#ff4f00"/>
  <text x="260" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">API Gateway</text>
  <text x="260" y="140" text-anchor="middle" fill="white" font-size="9">REST Endpoint</text>

  <!-- Lambda -->
  <rect x="380" y="100" width="120" height="60" rx="5" fill="#ff9900"/>
  <text x="440" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Lambda</text>
  <text x="440" y="140" text-anchor="middle" fill="white" font-size="9">Calculation</text>

  <!-- CloudWatch -->
  <rect x="550" y="100" width="100" height="60" rx="5" fill="#10b981"/>
  <text x="600" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">CloudWatch</text>
  <text x="600" y="140" text-anchor="middle" fill="white" font-size="9">Monitoring</text>

  <!-- Request Flow Box -->
  <rect x="50" y="190" width="300" height="100" rx="5" fill="white" stroke="#e2e8f0"/>
  <text x="200" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Request Flow</text>
  <text x="65" y="230" font-size="9" fill="#64748b">1. Client sends POST /calculate</text>
  <text x="65" y="245" font-size="9" fill="#64748b">2. API Gateway validates request</text>
  <text x="65" y="260" font-size="9" fill="#64748b">3. Lambda triggered</text>
  <text x="65" y="275" font-size="9" fill="#64748b">4. Calculate numerology</text>

  <!-- Response Flow Box -->
  <rect x="380" y="190" width="300" height="100" rx="5" fill="white" stroke="#e2e8f0"/>
  <text x="530" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Response Flow</text>
  <text x="395" y="230" font-size="9" fill="#64748b">1. Lambda returns JSON result</text>
  <text x="395" y="245" font-size="9" fill="#64748b">2. API Gateway formats response</text>
  <text x="395" y="260" font-size="9" fill="#64748b">3. CORS headers added</text>
  <text x="395" y="275" font-size="9" fill="#64748b">4. Client receives result</text>

  <!-- Calculation Details Box -->
  <rect x="50" y="310" width="630" height="80" rx="5" fill="#fef3c7" stroke="#fbbf24"/>
  <text x="365" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Numerology Calculations</text>
  <text x="65" y="350" font-size="9" fill="#78350f">" Life Path Number - Të ngŕy sinh</text>
  <text x="65" y="365" font-size="9" fill="#78350f">" Expression Number - Të hÍ tęn §y ç</text>
  <text x="365" y="350" font-size="9" fill="#78350f">" Soul Urge Number - Të nguyęn âm</text>
  <text x="365" y="365" font-size="9" fill="#78350f">" Personality Number - Të phĺ âm</text>
  <text x="580" y="350" font-size="9" fill="#78350f">" Birthday Number - Ngŕy sinh</text>

  <!-- Arrows -->
  <line x1="150" y1="130" x2="200" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="130" x2="380" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="130" x2="550" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
